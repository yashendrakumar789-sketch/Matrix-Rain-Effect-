<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hand-Controlled Particle System (Real-time)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        
        /* The video feed must be present but hidden behind the 3D canvas */
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; /* Keep it below the particle canvas (which is Z-index 2) */
            width: 100%;
            height: 100%;
            object-fit: cover;
            visibility: hidden; /* Hide the video element itself */
        }
    </style>
</head>
<body>
    <div id="info">
        **Simulation Status**<br>
        MediaPipe Status: <span id="mediapipe-status">Loading...</span><br>
        Gesture: <span id="gesture-type">Waiting for hand...</span><br>
        Pinch Strength: <span id="pinch-strength">0.00</span>
    </div>

    <video id="webcam" autoplay muted></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        // --- CORE VARIABLES ---
        let scene, camera, renderer, particles, attributes;
        let particleCount = 50000;
        let positions, velocities, colors, sizes;
        let frameCount = 0;
        
        // --- MEDIAPIPE VARIABLES ---
        const videoElement = document.getElementById('webcam');
        const mpStatus = document.getElementById('mediapipe-status');
        let hands; // The MediaPipe Hands object
        let lastHandData = null;

        // Conceptual object for hand tracking data (NOW UPDATED BY MEDIAPIPE)
        const handData = {
            isDetected: false,
            palmPosition: new THREE.Vector3(0, 0, 0),
            pinchStrength: 0, 
            gestureType: 'default' 
        };

        // Particle templates for dynamic switching (same as before)
        const particleTemplates = {
            default: { size: 5, expandRate: 0.0, colorBase: new THREE.Color(0xAAAAAA) },
            heart: { size: 10, expandRate: 0.05, colorBase: new THREE.Color(0xFF00FF) },
            fireworks: { size: 15, expandRate: 0.2, colorBase: new THREE.Color(0xFFFF00) },
            saturn: { size: 5, expandRate: 0.0, colorBase: new THREE.Color(0x8888FF) },
            flower: { size: 8, expandRate: 0.1, colorBase: new THREE.Color(0x00FF88) },
        };
        
        const gestureInfo = document.getElementById('gesture-type');
        const pinchInfo = document.getElementById('pinch-strength');

        init();
        setupMediaPipe(); // New MediaPipe setup function

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000011);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Set Z-index higher than video to ensure particles are on top
            renderer.domElement.style.zIndex = '2'; 
            document.body.appendChild(renderer.domElement);

            createParticleSystem();
            window.addEventListener('resize', onWindowResize, false);
            // We call animate() after MediaPipe setup is complete
        }

        // --- 2. MEDIAPIPE INITIALIZATION ---
        function setupMediaPipe() {
            mpStatus.textContent = 'Initializing Hand Model...';
            
            hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            // This event fires every time MediaPipe analyzes a video frame
            hands.onResults(onResults);
            
            // Initialize camera access
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    // Send the current video frame to MediaPipe for analysis
                    await hands.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            
            cameraUtils.start()
                .then(() => {
                    mpStatus.textContent = 'Ready (Looking for hand)';
                    // Start the Three.js animation loop once the camera is running
                    animate(); 
                })
                .catch(err => {
                    mpStatus.textContent = `Error: Camera access denied. (${err})`;
                });
        }

        // --- 3. MEDIAPIPE RESULTS PROCESSING ---
        function onResults(results) {
            lastHandData = results;
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handData.isDetected = true;
                const landmarks = results.multiHandLandmarks[0];
                
                // --- A. Position Mapping (e.g., PALM BASE - Landmark 0) ---
                // We use the 0th landmark (wrist) to represent the hand position
                // The coordinates (x, y) are normalized [0, 1] relative to the video feed.
                
                // Map the normalized position to Three.js coordinates [-15, 15] for the screen center
                const wrist = landmarks[0];
                handData.palmPosition.x = (wrist.x - 0.5) * -30; // X is inverted for intuitive movement
                handData.palmPosition.y = (wrist.y - 0.5) * -30; // Y is inverted (0 is top in video, -15 is top in 3D)
                handData.palmPosition.z = 0; // Keep Z constant for now or use depth (wrist.z * some factor)
                
                // --- B. Pinch Strength and Gesture Detection ---
                updatePinchAndGesture(landmarks);
            } else {
                handData.isDetected = false;
                handData.pinchStrength = 0;
                handData.gestureType = 'default';
            }
        }
        
        // --- 4. GESTURE LOGIC (WHERE WE DEFINE YOUR SYMBOLS) ---
        function updatePinchAndGesture(landmarks) {
            // Finger tip positions (Indices: Thumb=4, Index=8, Middle=12, Ring=16, Pinky=20)
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];
            
            const thumbBase = landmarks[2]; // Thumb base for distance normalization
            
            // Function to calculate normalized 3D distance squared
            const distSq = (p1, p2) => {
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const dz = p1.z - p2.z;
                return dx * dx + dy * dy + dz * dz;
            };
            
            // --- PINCH STRENGTH (INDEX and THUMB) ---
            const thumbIndexDistSq = distSq(thumbTip, indexTip);
            const thumbBaseIndexTipDistSq = distSq(thumbBase, indexTip);
            
            // Simple pinch calculation: Closer the tips are relative to base distance, the higher the pinch
            const normalizedPinch = 1 - Math.min(1, Math.max(0, thumbIndexDistSq / 0.005)); 
            handData.pinchStrength = normalizedPinch;

            // --- GESTURE RECOGNITION (YOUR SYMBOLS) ---
            
            // Check for a closed fist (All tips close to palm base - simplified)
            const isFist = distSq(indexTip, landmarks[0]) < 0.05 && 
                           distSq(middleTip, landmarks[0]) < 0.05 &&
                           distSq(ringTip, landmarks[0]) < 0.05;
                           
            // Check for 'OK' or 'Heart' (Pinch but other fingers are extended/upright)
            const indexUp = indexTip.y < landmarks[5].y;
            const middleUp = middleTip.y < landmarks[9].y;
            
            if (handData.pinchStrength > 0.8) {
                // If the pinch is strong AND the other fingers are mostly down/curled
                if (!indexUp && !middleUp) {
                    handData.gestureType = 'heart'; // Simple pinch gesture is mapped to 'heart'
                } else if (indexUp && middleUp) {
                    handData.gestureType = 'fireworks'; // Pinch, but fingers pointing up/out
                } else {
                    handData.gestureType = 'heart';
                }
            } else if (isFist) {
                 handData.gestureType = 'saturn'; // Closed hand/Fist
            } else if (indexUp && middleUp && distSq(thumbTip, landmarks[0]) > 0.1) {
                 handData.gestureType = 'flower'; // Open hand/V-shape/Peace sign
            } else {
                handData.gestureType = 'default';
            }
        }
        
        // --- 5. THREE.JS ANIMATION AND INTERACTION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Particle Behavior based on hand data
            updateParticleSystem();

            // 2. Render the scene
            renderer.render(scene, camera);
            frameCount++;
        }

        function updateParticleSystem() {
            const template = particleTemplates[handData.gestureType] || particleTemplates.default;
            const iPosArray = attributes.initialPosition.array;
            
            // Only update position data if the hand is detected, otherwise the particles hold shape
            const rotationSpeed = handData.isDetected ? 0.005 : 0.001; 

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // --- A. Template Switching and Shaping (Uses initialPosition) ---
                switch (handData.gestureType) {
                    case 'saturn':
                        // Flatten into a disc/ring shape
                        const radius = Math.sqrt(iPosArray[i3] * iPosArray[i3] + iPosArray[i3+2] * iPosArray[i3+2]);
                        const angle = Math.atan2(iPosArray[i3+2], iPosArray[i3]);
                        positions[i3] = radius * Math.cos(angle);
                        positions[i3 + 1] = iPosArray[i3+1] * 0.1; // Reduced Y
                        positions[i3 + 2] = radius * Math.sin(angle);
                        break;
                    case 'flower':
                        // Simple orbital motion for flower/cluster effect
                        positions[i3] = iPosArray[i3] * (1 + Math.sin(frameCount * 0.01 + i) * 0.1);
                        positions[i3 + 1] = iPosArray[i3 + 1] * (1 + Math.cos(frameCount * 0.01 + i) * 0.1);
                        positions[i3 + 2] = iPosArray[i3 + 2];
                        break;
                    default:
                        // Heart and Fireworks: Simple particle velocity/reset logic
                        positions[i3] += velocities[i3];
                        positions[i3 + 1] += velocities[i3 + 1];
                        positions[i3 + 2] += velocities[i3 + 2];
                        if (Math.abs(positions[i3]) > 20 || Math.abs(positions[i3 + 1]) > 20 || Math.abs(positions[i3 + 2]) > 20) {
                            positions[i3] = 0;
                            positions[i3 + 1] = 0;
                            positions[i3 + 2] = 0;
                        }
                        break;
                }
                
                // --- B. Hand Interaction (Repulsion/Explosion) ---
                if (handData.isDetected) {
                    const dx = positions[i3] - handData.palmPosition.x;
                    const dy = positions[i3 + 1] - handData.palmPosition.y;
                    const dz = positions[i3 + 2] - handData.palmPosition.z;
                    const distanceSq = dx * dx + dy * dy + dz * dz;

                    // Repulsion is proportional to pinch strength and inversely proportional to distance
                    if (distanceSq < 30) { 
                        const power = handData.pinchStrength * 0.05 / distanceSq; 
                        velocities[i3] += dx * power;
                        velocities[i3 + 1] += dy * power;
                        velocities[i3 + 2] += dz * power;
                    }
                }

                // --- C. Dynamic Size and Color ---
                const baseSize = template.size;
                sizes[i] = baseSize + Math.sin(frameCount * 0.05 + i) * 2; 

                if (template.expandRate > 0) {
                    sizes[i] *= (1 + handData.pinchStrength * template.expandRate);
                }

                const c = template.colorBase;
                const pinchBoost = handData.pinchStrength * 0.5;
                colors[i3] = c.r + Math.random() * 0.1 + pinchBoost;
                colors[i3 + 1] = c.g + Math.random() * 0.1 + pinchBoost;
                colors[i3 + 2] = c.b + Math.random() * 0.1 + pinchBoost;
            }
            
            // Signal Three.js that the attributes need updating
            attributes.position.needsUpdate = true;
            attributes.size.needsUpdate = true;
            attributes.color.needsUpdate = true;

            // Rotate the entire particle system
            particles.rotation.y += rotationSpeed;
            particles.rotation.x += rotationSpeed / 2;

            // Update UI Info
            gestureInfo.textContent = handData.isDetected ? handData.gestureType : 'Hand not visible';
            pinchInfo.textContent = handData.pinchStrength.toFixed(2);
        }
        
        // --- 6. UTILITY FUNCTIONS (same as before) ---
        function createParticleSystem() {
            // (Same as before) ... 
            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            velocities = new Float32Array(particleCount * 3);
            colors = new Float32Array(particleCount * 3);
            sizes = new Float32Array(particleCount);
            const initialPositions = new Float32Array(particleCount * 3); 

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = 10 * Math.random();
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.random() * Math.PI;

                positions[i3] = radius * Math.sin(theta) * Math.cos(phi);
                positions[i3 + 1] = radius * Math.sin(theta) * Math.sin(phi);
                positions[i3 + 2] = radius * Math.cos(theta);

                initialPositions[i3] = positions[i3];
                initialPositions[i3 + 1] = positions[i3 + 1];
                initialPositions[i3 + 2] = positions[i3 + 2];

                velocities[i3] = 0.05 * (Math.random() - 0.5);
                velocities[i3 + 1] = 0.05 * (Math.random() - 0.5);
                velocities[i3 + 2] = 0.05 * (Math.random() - 0.5);

                sizes[i] = 10; 
                colors[i3] = 1.0; colors[i3 + 1] = 1.0; colors[i3 + 2] = 1.0; 
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3).setUsage(THREE.DynamicDrawUsage));
            geometry.setAttribute('initialPosition', new THREE.BufferAttribute(initialPositions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3).setUsage(THREE.DynamicDrawUsage));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1).setUsage(THREE.DynamicDrawUsage));
            
            const material = new THREE.PointsMaterial({
                size: 1, 
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthTest: false,
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            attributes = particles.geometry.attributes;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
